<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연습실 예약 · Pedagogy</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1a5fb4;
    --blue-light: #e8f0fc;
    --green: #1c8a5e;
    --green-light: #d6f0e6;
    --red: #c0392b;
    --red-light: #fde8e6;
    --border: #e5e7eb;
    --text: #111827;
    --text-sub: #6b7280;
    --white: #ffffff;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f0f4f8; min-height: 100vh; color: var(--text); }

  .header {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 14px 20px; position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-logo { font-size: 22px; }
  .header-title { font-size: 16px; font-weight: 700; }
  .header-sub { font-size: 11px; color: var(--text-sub); margin-top: 1px; }
  .header-name {
    font-size: 13px; color: var(--blue); font-weight: 600;
    cursor: pointer; padding: 6px 14px;
    border: 1.5px solid var(--blue); border-radius: 20px;
    background: var(--blue-light); transition: opacity 0.15s;
  }
  .header-name:hover { opacity: 0.8; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 20px;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--white); border-radius: 20px;
    padding: 32px 28px; width: 100%; max-width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: popIn 0.2s ease;
  }
  @keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-emoji { font-size: 36px; margin-bottom: 12px; }
  .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .modal-sub { font-size: 13px; color: var(--text-sub); margin-bottom: 24px; line-height: 1.6; }
  .modal input {
    width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
    padding: 13px 16px; font-size: 15px; font-family: inherit;
    outline: none; transition: border 0.15s; margin-bottom: 12px;
  }
  .modal input:focus { border-color: var(--blue); }
  .modal-btn {
    width: 100%; background: var(--blue); color: var(--white);
    border: none; border-radius: 10px; padding: 14px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: opacity 0.15s;
  }
  .modal-btn:hover { opacity: 0.88; }

  .main { max-width: 480px; margin: 0 auto; padding: 16px; }

  .tabs {
    display: flex; background: var(--white);
    border-radius: var(--radius); padding: 4px; gap: 3px;
    margin-bottom: 12px; box-shadow: var(--shadow);
  }
  .tab {
    flex: 1; text-align: center; padding: 10px 6px;
    font-size: 13px; font-weight: 500; color: var(--text-sub);
    border-radius: 10px; cursor: pointer;
    font-family: inherit; border: none; background: none;
    transition: all 0.15s;
  }
  .tab.active { background: var(--blue); color: var(--white); font-weight: 700; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .card {
    background: var(--white); border-radius: var(--radius);
    padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow);
  }
  .card-label { font-size: 11px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }

  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .cal-month { font-size: 16px; font-weight: 700; }
  .cal-nav {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    width: 32px; height: 32px; cursor: pointer; font-size: 18px;
    color: var(--text-sub); display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .cal-nav:hover { background: #f3f4f6; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-lbl { font-size: 11px; color: var(--text-sub); text-align: center; padding: 4px 0; font-weight: 500; }
  .cal-cell {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 13px; border-radius: 50%; cursor: pointer; position: relative;
    transition: all 0.1s;
  }
  .cal-cell:hover:not(.past):not(.empty) { background: #f3f4f6; }
  .cal-cell.today { background: var(--blue-light); color: var(--blue); font-weight: 700; }
  .cal-cell.selected { background: var(--blue); color: var(--white); font-weight: 700; }
  .cal-cell.past { color: #d1d5db; cursor: default; }
  .cal-cell.empty { cursor: default; }
  .cal-cell.has-dot::after {
    content: ''; position: absolute; bottom: 3px;
    width: 4px; height: 4px; border-radius: 50%; background: var(--green);
  }
  .cal-cell.selected.has-dot::after { background: rgba(255,255,255,0.7); }

  .date-heading { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .slots-wrap { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
  .slots-wrap::-webkit-scrollbar { width: 3px; }
  .slots-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  .slot {
    display: flex; align-items: center; justify-content: space-between;
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 11px 14px; cursor: pointer; transition: all 0.12s; background: var(--white);
  }
  .slot:hover:not(.booked):not(.mine) { border-color: var(--blue); background: var(--blue-light); }
  .slot.selected { border-color: var(--blue); background: var(--blue-light); }
  .slot.mine { border-color: var(--green); background: var(--green-light); cursor: default; }
  .slot.booked { background: #f9fafb; cursor: not-allowed; }
  .slot-time { font-size: 13px; font-weight: 500; }
  .slot.booked .slot-time { color: #9ca3af; }
  .slot.mine .slot-time { color: var(--green); font-weight: 600; }
  .slot.selected .slot-time { color: var(--blue); font-weight: 600; }
  .slot-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .b-free { background: #ecfdf5; color: var(--green); }
  .b-sel { background: var(--blue-light); color: var(--blue); }
  .b-mine { background: var(--green-light); color: var(--green); }
  .b-booked { background: #f3f4f6; color: #9ca3af; }

  .book-btn {
    width: 100%; background: var(--blue); color: var(--white);
    border: none; border-radius: var(--radius); padding: 15px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all 0.15s; margin-bottom: 12px;
  }
  .book-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .book-btn:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; transform: none; }

  .legend { display: flex; gap: 14px; flex-wrap: wrap; padding: 10px 0 2px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-sub); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .mine-item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--white); border-radius: 10px; padding: 14px 16px;
    margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    border: 1px solid var(--border);
  }
  .mine-date { font-size: 14px; font-weight: 600; }
  .mine-time { font-size: 12px; color: var(--text-sub); margin-top: 3px; }
  .cancel-btn {
    background: var(--red-light); color: var(--red); border: none;
    border-radius: 8px; padding: 7px 13px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: background 0.15s; white-space: nowrap;
  }
  .cancel-btn:hover { background: #fbd5d2; }

  .empty { text-align: center; color: #9ca3af; font-size: 14px; padding: 40px 0; }
  .loading { text-align: center; color: #9ca3af; padding: 24px; font-size: 13px; }

  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #111827; color: var(--white);
    padding: 12px 22px; border-radius: 24px;
    font-size: 14px; font-weight: 500; z-index: 999;
    opacity: 0; transition: all 0.3s ease;
    pointer-events: none; white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- 이름 입력 모달 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-emoji">🎵</div>
    <div class="modal-title">연습실 예약</div>
    <div class="modal-sub">예약을 위해 이름을 입력해주세요.<br>입력한 이름으로 예약이 등록됩니다.</div>
    <input type="text" id="name-input" placeholder="이름 입력 (예: 김지수)" maxlength="10" />
    <button class="modal-btn" id="name-btn">시작하기 →</button>
  </div>
</div>

<!-- 헤더 -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">🎵</div>
    <div>
      <div class="header-title">연습실 예약</div>
      <div class="header-sub">Pedagogy-Lesson Room</div>
    </div>
  </div>
  <div class="header-name" id="header-name">이름 입력</div>
</div>

<div class="main">
  <!-- 탭 -->
  <div class="tabs">
    <button class="tab active" data-tab="book">📅 예약하기</button>
    <button class="tab" data-tab="mine">📋 내 예약</button>
  </div>

  <!-- 예약 탭 -->
  <div class="tab-panel active" id="tab-book">
    <div class="card">
      <div class="card-label">날짜 선택</div>
      <div class="cal-header">
        <button class="cal-nav" id="prev-btn">‹</button>
        <span class="cal-month" id="cal-month"></span>
        <button class="cal-nav" id="next-btn">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <div class="card">
      <div class="date-heading" id="date-heading">날짜를 선택해주세요</div>
      <div class="card-label">시간 선택 · 30분 단위</div>
      <div class="slots-wrap" id="slots-wrap">
        <div class="loading">날짜를 먼저 선택해주세요</div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>선택됨</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>내 예약</div>
        <div class="legend-item"><div class="legend-dot" style="background:#d1d5db"></div>예약됨</div>
      </div>
    </div>

    <button class="book-btn" id="book-btn" disabled>날짜와 시간을 선택하세요</button>
  </div>

  <!-- 내 예약 탭 -->
  <div class="tab-panel" id="tab-mine">
    <div id="mine-list"><div class="loading">불러오는 중...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbKe1LnPQ0I0FnWWmATNyck2RSL9_xrJE",
  authDomain: "pedagogy-lesson-room-booking.firebaseapp.com",
  projectId: "pedagogy-lesson-room-booking",
  storageBucket: "pedagogy-lesson-room-booking.firebasestorage.app",
  messagingSenderId: "268158400200",
  appId: "1:268158400200:web:1fe1bedbf753e08c2057fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 상태
const today = new Date();
let cYear = today.getFullYear(), cMonth = today.getMonth();
let selDate = null, selSlot = null;
let userName = localStorage.getItem('booking-name') || '';
let allBookings = {};

// 슬롯 생성 09:00~22:00
const SLOTS = [];
for (let h = 9; h < 22; h++) {
  SLOTS.push(`${String(h).padStart(2,'0')}:00 ~ ${String(h).padStart(2,'0')}:30`);
  SLOTS.push(`${String(h).padStart(2,'0')}:30 ~ ${String(h+1).padStart(2,'0')}:00`);
}

function dk(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// 이름 모달
function checkName() {
  if (!userName) {
    document.getElementById('modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('name-input').focus(), 100);
  } else {
    document.getElementById('modal').classList.add('hidden');
    document.getElementById('header-name').textContent = userName;
  }
}

document.getElementById('name-btn').addEventListener('click', () => {
  const val = document.getElementById('name-input').value.trim();
  if (!val) { showToast('이름을 입력해주세요'); return; }
  userName = val;
  localStorage.setItem('booking-name', userName);
  document.getElementById('header-name').textContent = userName;
  document.getElementById('modal').classList.add('hidden');
  renderMine();
});

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('name-btn').click();
});

document.getElementById('header-name').addEventListener('click', () => {
  document.getElementById('name-input').value = userName;
  document.getElementById('modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('name-input').focus(), 100);
});

// 탭
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'mine') renderMine();
  });
});

// Firebase 실시간 구독
const q = query(collection(db, 'bookings'), orderBy('createdAt', 'asc'));
onSnapshot(q, snapshot => {
  allBookings = {};
  snapshot.forEach(d => {
    const data = d.data();
    if (!allBookings[data.date]) allBookings[data.date] = {};
    allBookings[data.date][data.slot] = { name: data.name, docId: d.id };
  });
  renderCal();
  if (selDate) renderSlots();
  renderMine();
}, err => {
  showToast('⚠️ 연결 오류: ' + err.message);
});

// 달력
document.getElementById('prev-btn').addEventListener('click', () => {
  cMonth--; if (cMonth < 0) { cMonth = 11; cYear--; } renderCal();
});
document.getElementById('next-btn').addEventListener('click', () => {
  cMonth++; if (cMonth > 11) { cMonth = 0; cYear++; } renderCal();
});

function renderCal() {
  document.getElementById('cal-month').textContent =
    new Date(cYear, cMonth, 1).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long' });

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['일','월','화','수','목','금','토'].forEach(d => {
    const el = document.createElement('div'); el.className = 'cal-lbl'; el.textContent = d; grid.appendChild(el);
  });

  const firstDay = new Date(cYear, cMonth, 1).getDay();
  const daysInMonth = new Date(cYear, cMonth + 1, 0).getDate();
  const todayKey = dk(today.getFullYear(), today.getMonth(), today.getDate());

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div'); el.className = 'cal-cell empty'; grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const key = dk(cYear, cMonth, d);
    const isPast = new Date(cYear, cMonth, d) < new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const el = document.createElement('div');
    el.className = 'cal-cell';
    el.textContent = d;
    if (isPast) {
      el.classList.add('past');
    } else {
      if (key === todayKey) el.classList.add('today');
      if (key === selDate) el.classList.add('selected');
      if (allBookings[key] && Object.keys(allBookings[key]).length > 0) el.classList.add('has-dot');
      el.addEventListener('click', () => selectDate(key, d));
    }
    grid.appendChild(el);
  }
}

function selectDate(key, d) {
  selDate = key; selSlot = null;
  renderCal();
  document.getElementById('date-heading').textContent =
    new Date(cYear, cMonth, d).toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
  renderSlots();
  updateBtn();
}

function renderSlots() {
  const wrap = document.getElementById('slots-wrap');
  wrap.innerHTML = '';
  if (!selDate) return;
  const dayB = allBookings[selDate] || {};

  SLOTS.forEach((label, i) => {
    const entry = dayB[i];
    const isMine = entry && entry.name === userName;
    const isBooked = !!entry && !isMine;
    const isSelected = selSlot === i;

    const el = document.createElement('div');
    el.className = 'slot';

    let bc, bt;
    if (isMine) { el.classList.add('mine'); bc = 'b-mine'; bt = '내 예약'; }
    else if (isBooked) { el.classList.add('booked'); bc = 'b-booked'; bt = entry.name; }
    else if (isSelected) { el.classList.add('selected'); bc = 'b-sel'; bt = '선택됨'; }
    else { bc = 'b-free'; bt = '예약 가능'; }

    el.innerHTML = `<span class="slot-time">${label}</span><span class="slot-badge ${bc}">${bt}</span>`;

    if (!isMine && !isBooked) {
      el.addEventListener('click', () => { selSlot = i; renderSlots(); updateBtn(); });
    }
    wrap.appendChild(el);
  });
}

function updateBtn() {
  const btn = document.getElementById('book-btn');
  if (selDate && selSlot !== null) {
    btn.disabled = false;
    btn.textContent = `${SLOTS[selSlot]} 예약하기`;
  } else {
    btn.disabled = true;
    btn.textContent = '날짜와 시간을 선택하세요';
  }
}

// 예약 버튼
document.getElementById('book-btn').addEventListener('click', async () => {
  if (!userName) { checkName(); return; }
  if (!selDate || selSlot === null) return;

  const btn = document.getElementById('book-btn');
  btn.disabled = true;
  btn.textContent = '예약 중...';

  try {
    const docId = `${selDate}_${String(selSlot).padStart(3,'0')}`;
    await setDoc(doc(db, 'bookings', docId), {
      date: selDate,
      slot: selSlot,
      slotLabel: SLOTS[selSlot],
      name: userName,
      createdAt: new Date().toISOString()
    });
    showToast('🎉 예약 완료!');
    selSlot = null;
    updateBtn();
  } catch (e) {
    console.error('예약 오류:', e);
    showToast('❌ 예약 실패: ' + e.message);
    updateBtn();
  }
});

// 내 예약
function renderMine() {
  const el = document.getElementById('mine-list');
  if (!userName) { el.innerHTML = '<div class="empty">이름을 먼저 입력해주세요</div>'; return; }

  const mine = [];
  Object.entries(allBookings).forEach(([date, slots]) => {
    Object.entries(slots).forEach(([si, entry]) => {
      if (entry.name === userName) mine.push({ date, si: +si, slotLabel: SLOTS[+si], docId: entry.docId });
    });
  });
  mine.sort((a, b) => a.date.localeCompare(b.date) || a.si - b.si);

  if (!mine.length) { el.innerHTML = '<div class="empty">예약 내역이 없어요</div>'; return; }

  el.innerHTML = '';
  mine.forEach(m => {
    const dateLabel = new Date(m.date + 'T00:00:00').toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
    const item = document.createElement('div');
    item.className = 'mine-item';
    item.innerHTML = `
      <div>
        <div class="mine-date">${dateLabel}</div>
        <div class="mine-time">${m.slotLabel}</div>
      </div>
      <button class="cancel-btn">취소</button>
    `;
    item.querySelector('.cancel-btn').addEventListener('click', () => cancelBooking(m.docId, dateLabel, m.slotLabel));
    el.appendChild(item);
  });
}

async function cancelBooking(docId, dateLabel, slotLabel) {
  if (!confirm(`${dateLabel} ${slotLabel}\n예약을 취소할까요?`)) return;
  try {
    await deleteDoc(doc(db, 'bookings', docId));
    showToast('예약이 취소됐어요');
  } catch (e) {
    showToast('❌ 취소 실패: ' + e.message);
  }
}

// 시작
checkName();
renderCal();
</script>
</body>
</html>
