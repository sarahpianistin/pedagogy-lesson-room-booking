<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연습실 예약 시스템</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { background: #f5f5f7; min-height: 100vh; }

  /* 로그인 화면 */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .login-card { background: #fff; border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 380px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
  .login-logo { font-size: 40px; text-align: center; margin-bottom: 8px; }
  .login-title { font-size: 22px; font-weight: 600; text-align: center; color: #1a1a1a; margin-bottom: 4px; }
  .login-sub { font-size: 14px; color: #888; text-align: center; margin-bottom: 32px; }
  .input-group { margin-bottom: 14px; }
  .input-group label { font-size: 12px; font-weight: 500; color: #555; display: block; margin-bottom: 5px; }
  .input-group input { width: 100%; border: 1px solid #e0e0e0; border-radius: 10px; padding: 11px 14px; font-size: 15px; outline: none; transition: border 0.15s; }
  .input-group input:focus { border-color: #185FA5; }
  .btn-primary { width: 100%; background: #185FA5; color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; margin-top: 4px; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-secondary { width: 100%; background: none; color: #185FA5; border: 1px solid #185FA5; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 10px; transition: background 0.15s; }
  .btn-secondary:hover { background: #E6F1FB; }
  .login-divider { text-align: center; font-size: 12px; color: #bbb; margin: 14px 0; }
  .error-msg { color: #E24B4A; font-size: 12px; margin-top: 8px; text-align: center; display: none; }

  /* 앱 화면 */
  #app-screen { display: none; max-width: 480px; margin: 0 auto; min-height: 100vh; background: #f5f5f7; }
  .app-header { background: #fff; padding: 16px 20px 12px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
  .app-header-top { display: flex; justify-content: space-between; align-items: center; }
  .app-title { font-size: 18px; font-weight: 600; color: #1a1a1a; }
  .app-sub { font-size: 12px; color: #888; margin-top: 1px; }
  .user-badge { display: flex; align-items: center; gap: 8px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: #B5D4F4; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #0C447C; }
  .logout-btn { font-size: 12px; color: #888; cursor: pointer; border: none; background: none; padding: 4px 8px; border-radius: 6px; }
  .logout-btn:hover { background: #f0f0f0; }

  /* 탭 네비게이션 */
  .tab-nav { display: flex; background: #fff; border-bottom: 1px solid #eee; }
  .tab-item { flex: 1; padding: 12px 4px; text-align: center; font-size: 12px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab-item.active { color: #185FA5; border-bottom-color: #185FA5; font-weight: 500; }
  .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }

  /* 콘텐츠 영역 */
  .tab-content { display: none; padding: 16px; }
  .tab-content.active { display: block; }

  /* 달력 */
  .card { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 12px; }
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .cal-month { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  .cal-nav-btn { background: none; border: 1px solid #e0e0e0; border-radius: 8px; width: 30px; height: 30px; cursor: pointer; font-size: 16px; color: #555; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-day-label { font-size: 11px; color: #aaa; text-align: center; padding: 4px 0; font-weight: 500; }
  .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; border-radius: 50%; cursor: pointer; color: #1a1a1a; position: relative; transition: background 0.1s; }
  .cal-cell:hover:not(.past):not(.empty) { background: #f0f0f0; }
  .cal-cell.today { background: #E6F1FB; color: #185FA5; font-weight: 600; }
  .cal-cell.selected { background: #185FA5; color: #fff; font-weight: 600; }
  .cal-cell.past { color: #ccc; cursor: default; }
  .cal-cell.empty { cursor: default; }
  .cal-cell.has-booking::after { content: ''; position: absolute; bottom: 3px; width: 4px; height: 4px; border-radius: 50%; background: #1D9E75; }
  .cal-cell.selected.has-booking::after { background: #9FE1CB; }

  /* 시간 슬롯 */
  .date-label { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 10px; }
  .slots-container { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
  .slot { display: flex; align-items: center; justify-content: space-between; border: 1px solid #e8e8e8; border-radius: 12px; padding: 10px 14px; cursor: pointer; transition: all 0.1s; }
  .slot:hover:not(.booked):not(.my-slot) { border-color: #185FA5; background: #f8fbff; }
  .slot.selected { border: 2px solid #185FA5; background: #E6F1FB; }
  .slot.booked { background: #f9f9f9; cursor: not-allowed; }
  .slot.my-slot { background: #E1F5EE; border-color: #5DCAA5; cursor: default; }
  .slot-time { font-size: 13px; font-weight: 500; color: #1a1a1a; }
  .slot.booked .slot-time { color: #bbb; }
  .slot.my-slot .slot-time { color: #0F6E56; }
  .slot.selected .slot-time { color: #185FA5; }
  .slot-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .badge-free { background: #EAF3DE; color: #3B6D11; }
  .badge-booked { background: #f0f0f0; color: #aaa; }
  .badge-mine { background: #E1F5EE; color: #0F6E56; }
  .badge-sel { background: #E6F1FB; color: #185FA5; }

  /* 예약 버튼 */
  .book-btn { width: 100%; background: #185FA5; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.15s; }
  .book-btn:hover:not(:disabled) { opacity: 0.88; }
  .book-btn:disabled { background: #e0e0e0; color: #aaa; cursor: not-allowed; }

  /* 내 예약 목록 */
  .booking-item { display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; }
  .booking-info .booking-date { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .booking-info .booking-time { font-size: 12px; color: #888; margin-top: 2px; }
  .cancel-btn { background: #FCEBEB; color: #A32D2D; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 500; cursor: pointer; }
  .cancel-btn:hover { background: #f7c1c1; }
  .empty-msg { text-align: center; color: #aaa; font-size: 14px; padding: 40px 0; }

  /* 관리자 */
  .admin-tab-bar { display: flex; background: #eee; border-radius: 10px; padding: 3px; gap: 2px; margin-bottom: 14px; }
  .admin-tab { flex: 1; text-align: center; padding: 8px; font-size: 12px; font-weight: 500; color: #888; border-radius: 8px; cursor: pointer; }
  .admin-tab.active { background: #fff; color: #1a1a1a; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-card { background: #fff; border-radius: 12px; padding: 14px; }
  .stat-val { font-size: 24px; font-weight: 700; color: #1a1a1a; }
  .stat-lbl { font-size: 11px; color: #888; margin-top: 2px; }
  .admin-booking-item { background: #fff; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
  .admin-booking-row { display: flex; justify-content: space-between; align-items: center; }
  .admin-booking-name { font-size: 13px; font-weight: 500; color: #1a1a1a; }
  .admin-booking-detail { font-size: 12px; color: #888; margin-top: 2px; }

  /* 알림 */
  .noti-item { background: #fff; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; gap: 10px; align-items: flex-start; }
  .noti-icon { font-size: 20px; flex-shrink: 0; }
  .noti-text { font-size: 13px; color: #1a1a1a; line-height: 1.5; }
  .noti-time { font-size: 11px; color: #aaa; margin-top: 2px; }

  /* 토스트 */
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 12px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* 로딩 */
  .loading { text-align: center; color: #aaa; padding: 30px; font-size: 14px; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🎵</div>
    <div class="login-title">연습실 예약</div>
    <div class="login-sub">Pedagogy-Lesson Room Booking</div>
    <div class="input-group">
      <label>이메일</label>
      <input type="email" id="login-email" placeholder="이메일 입력" />
    </div>
    <div class="input-group">
      <label>비밀번호</label>
      <input type="password" id="login-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')loginUser()" />
    </div>
    <div class="error-msg" id="login-error">이메일 또는 비밀번호를 확인해주세요.</div>
    <button class="btn-primary" onclick="loginUser()">로그인</button>
    <div class="login-divider">또는</div>
    <button class="btn-secondary" onclick="showSignup()">처음이세요? 회원가입</button>

    <!-- 회원가입 폼 (숨김) -->
    <div id="signup-form" style="display:none; margin-top:16px; border-top:1px solid #eee; padding-top:16px;">
      <div class="input-group">
        <label>이름</label>
        <input type="text" id="signup-name" placeholder="이름 입력" />
      </div>
      <div class="input-group">
        <label>이메일</label>
        <input type="email" id="signup-email" placeholder="이메일 입력" />
      </div>
      <div class="input-group">
        <label>비밀번호 (6자 이상)</label>
        <input type="password" id="signup-pw" placeholder="비밀번호 입력" />
      </div>
      <div class="error-msg" id="signup-error"></div>
      <button class="btn-primary" onclick="signupUser()">회원가입</button>
      <button class="btn-secondary" onclick="hideSignup()">취소</button>
    </div>
  </div>
</div>

<!-- 앱 화면 -->
<div id="app-screen">
  <div class="app-header">
    <div class="app-header-top">
      <div>
        <div class="app-title">🎵 연습실 예약</div>
        <div class="app-sub" id="room-name">Pedagogy-Lesson Room</div>
      </div>
      <div class="user-badge">
        <div class="avatar" id="user-avatar">?</div>
        <button class="logout-btn" onclick="logoutUser()">로그아웃</button>
      </div>
    </div>
  </div>

  <div class="tab-nav">
    <div class="tab-item active" onclick="setTab('book', this)">
      <span class="tab-icon">📅</span>예약
    </div>
    <div class="tab-item" onclick="setTab('mybookings', this)">
      <span class="tab-icon">📋</span>내 예약
    </div>
    <div class="tab-item" onclick="setTab('admin', this)">
      <span class="tab-icon">🛠</span>관리자
    </div>
    <div class="tab-item" onclick="setTab('noti', this)">
      <span class="tab-icon">🔔</span>알림
    </div>
  </div>

  <!-- 예약 탭 -->
  <div class="tab-content active" id="tab-book">
    <div class="card">
      <div class="card-title">날짜 선택</div>
      <div class="cal-header">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <span class="cal-month" id="cal-month"></span>
        <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <div class="card">
      <div class="date-label" id="selected-date-label">날짜를 선택해주세요</div>
      <div class="card-title">시간 선택 (30분 단위)</div>
      <div class="slots-container" id="slots-container">
        <div class="loading">날짜를 먼저 선택해주세요</div>
      </div>
      <div class="legend" style="margin-top:10px;">
        <div class="legend-item"><div class="legend-dot" style="background:#185FA5;"></div>선택됨</div>
        <div class="legend-item"><div class="legend-dot" style="background:#1D9E75;"></div>내 예약</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ddd;"></div>예약됨</div>
      </div>
    </div>
<button class="book-btn" id="book-btn" disabled>날짜와 시간을 선택하세요</button>
  </div>

  <!-- 내 예약 탭 -->
  <div class="tab-content" id="tab-mybookings">
    <div id="my-bookings-list"><div class="loading">불러오는 중...</div></div>
  </div>

  <!-- 관리자 탭 -->
  <div class="tab-content" id="tab-admin">
    <div class="admin-tab-bar">
      <div class="admin-tab active" onclick="setAdminTab('stats', this)">통계</div>
      <div class="admin-tab" onclick="setAdminTab('all', this)">전체 예약</div>
    </div>
    <div id="admin-stats-view">
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-val" id="stat-total">-</div><div class="stat-lbl">총 예약 건수</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-hours">-</div><div class="stat-lbl">총 사용 시간</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-today">-</div><div class="stat-lbl">오늘 예약</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-users">-</div><div class="stat-lbl">이용 인원</div></div>
      </div>
    </div>
    <div id="admin-all-view" style="display:none;">
      <div id="all-bookings-list"><div class="loading">불러오는 중...</div></div>
    </div>
  </div>

  <!-- 알림 탭 -->
  <div class="tab-content" id="tab-noti">
    <div id="noti-list"><div class="empty-msg">알림이 없습니다</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbKe1LnPQ0I0FnWWmATNyck2RSL9_xrJE",
  authDomain: "pedagogy-lesson-room-booking.firebaseapp.com",
  projectId: "pedagogy-lesson-room-booking",
  storageBucket: "pedagogy-lesson-room-booking.firebasestorage.app",
  messagingSenderId: "268158400200",
  appId: "1:268158400200:web:1fe1bedbf753e08c2057fd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 상태
const today = new Date();
let cYear = today.getFullYear(), cMonth = today.getMonth();
let selDate = null, selSlot = null;
let currentUser = null;
let allBookings = {};
let notiItems = [];
let unsubscribe = null;

// 시간 슬롯 생성 (09:00 ~ 22:00, 30분 단위)
const SLOTS = [];
for (let h = 9; h < 22; h++) {
  SLOTS.push(`${String(h).padStart(2,'0')}:00 ~ ${String(h).padStart(2,'0')}:30`);
  SLOTS.push(`${String(h).padStart(2,'0')}:30 ~ ${String(h+1).padStart(2,'0')}:00`);
}

function dk(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── 인증 ───
window.loginUser = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) {
    document.getElementById('login-error').style.display = 'block';
  }
};

window.signupUser = async () => {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pw = document.getElementById('signup-pw').value;
  const errEl = document.getElementById('signup-error');
  if (!name) { errEl.textContent = '이름을 입력해주세요.'; errEl.style.display='block'; return; }
  if (pw.length < 6) { errEl.textContent = '비밀번호는 6자 이상이어야 해요.'; errEl.style.display='block'; return; }
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    await updateProfile(cred.user, { displayName: name });
    showToast('🎉 회원가입 완료! 환영해요!');
  } catch(e) {
    errEl.textContent = e.code === 'auth/email-already-in-use' ? '이미 사용 중인 이메일이에요.' : '회원가입 실패. 다시 시도해주세요.';
    errEl.style.display = 'block';
  }
};

window.logoutUser = async () => {
  if (unsubscribe) unsubscribe();
  await signOut(auth);
};

window.showSignup = () => { document.getElementById('signup-form').style.display = 'block'; };
window.hideSignup = () => { document.getElementById('signup-form').style.display = 'none'; };

// 인증 상태 감지
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    const initials = (user.displayName || user.email).substring(0,2).toUpperCase();
    document.getElementById('user-avatar').textContent = initials;
    startListening();
    renderCal();
  } else {
    currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
});

// ─── 실시간 예약 데이터 수신 ───
function startListening() {
  const q = query(collection(db, 'bookings'), orderBy('createdAt', 'desc'));
  unsubscribe = onSnapshot(q, snapshot => {
    allBookings = {};
    snapshot.forEach(doc => {
      const d = doc.data();
      if (!allBookings[d.date]) allBookings[d.date] = {};
      allBookings[d.date][d.slot] = { user: d.userName, uid: d.uid, docId: doc.id };
    });
    renderCal();
    if (selDate) renderSlots();
    renderMyBookings();
    renderAllBookings();
    updateStats();
  });
}

// ─── 달력 ───
window.changeMonth = (dir) => {
  cMonth += dir;
  if (cMonth < 0) { cMonth = 11; cYear--; }
  if (cMonth > 11) { cMonth = 0; cYear++; }
  renderCal();
};

function renderCal() {
  const label = new Date(cYear, cMonth, 1).toLocaleDateString('ko-KR', {year:'numeric', month:'long'});
  document.getElementById('cal-month').textContent = label;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['일','월','화','수','목','금','토'].forEach(d => {
    const el = document.createElement('div'); el.className = 'cal-day-label'; el.textContent = d; grid.appendChild(el);
  });
  const first = new Date(cYear, cMonth, 1).getDay();
  const days = new Date(cYear, cMonth+1, 0).getDate();
  for (let i=0; i<first; i++) { const el=document.createElement('div'); el.className='cal-cell empty'; grid.appendChild(el); }
  for (let d=1; d<=days; d++) {
    const el = document.createElement('div'); el.className = 'cal-cell'; el.textContent = d;
    const date = new Date(cYear, cMonth, d);
    const key = dk(date);
    const isPast = date < new Date(today.getFullYear(), today.getMonth(), today.getDate());
    if (isPast) { el.classList.add('past'); }
    else {
      if (d===today.getDate() && cMonth===today.getMonth() && cYear===today.getFullYear()) el.classList.add('today');
      if (allBookings[key] && Object.keys(allBookings[key]).length > 0) el.classList.add('has-booking');
      if (selDate===key) el.classList.add('selected');
      el.onclick = () => selectDate(key, d);
    }
    grid.appendChild(el);
  }
}

function selectDate(key, d) {
  selDate = key; selSlot = null;
  renderCal();
  const label = new Date(cYear, cMonth, d).toLocaleDateString('ko-KR', {month:'long', day:'numeric', weekday:'short'});
  document.getElementById('selected-date-label').textContent = label;
  renderSlots(); updateBtn();
}

// ─── 시간 슬롯 ───
function renderSlots() {
  const wrap = document.getElementById('slots-container');
  wrap.innerHTML = '';
  if (!selDate) return;
  const dayB = allBookings[selDate] || {};
  SLOTS.forEach((label, i) => {
    const el = document.createElement('div'); el.className = 'slot';
    const entry = dayB[i];
    const isMine = entry && entry.uid === currentUser.uid;
    const isBooked = !!entry;
    let badge = '';
    if (isMine) {
      el.classList.add('my-slot');
      badge = `<span class="slot-badge badge-mine">내 예약</span>`;
    } else if (isBooked) {
      el.classList.add('booked');
      badge = `<span class="slot-badge badge-booked">${entry.user}</span>`;
    } else {
      if (selSlot === i) { el.classList.add('selected'); badge = `<span class="slot-badge badge-sel">선택됨</span>`; }
      else badge = `<span class="slot-badge badge-free">예약 가능</span>`;
      el.onclick = () => { selSlot = i; renderSlots(); updateBtn(); };
    }
    el.innerHTML = `<span class="slot-time">${label}</span>${badge}`;
    wrap.appendChild(el);
  });
}

function updateBtn() {
  const btn = document.getElementById('book-btn');
  if (selDate && selSlot !== null) {
    btn.disabled = false;
    btn.textContent = `${SLOTS[selSlot]} 예약하기`;
    btn.onclick = makeBooking;
  } else { 
    btn.disabled = true; 
    btn.textContent = '날짜와 시간을 선택하세요';
    btn.onclick = null;
  }
}

// ─── 예약 저장 ───
window.makeBooking = async () => {
  console.log('makeBooking 실행:', selDate, selSlot, currentUser?.uid);
  if (!selDate || selSlot === null || !currentUser) {
    console.log('조건 실패:', {selDate, selSlot, currentUser});
    showToast('❌ 날짜, 시간, 로그인 확인해주세요');
    return;
  }

  try {
    const docId = `${selDate}_${selSlot}`;
    await setDoc(doc(db, 'bookings', docId), {
      date: selDate,
      slot: selSlot,
      slotLabel: SLOTS[selSlot],
      uid: currentUser.uid,
      userName: currentUser.displayName || currentUser.email,
      createdAt: new Date().toISOString()
    });
    const dateLabel = new Date(selDate+'T00:00:00').toLocaleDateString('ko-KR', {month:'long', day:'numeric'});
    addNoti('✅', `${dateLabel} ${SLOTS[selSlot]} 예약 완료`);
    showToast('🎉 예약이 완료됐어요!');
    selSlot = null; updateBtn();
  } catch(e) { showToast('❌ 예약 실패. 다시 시도해주세요.'); }
};

// ─── 예약 취소 ───
window.cancelBooking = async (docId, dateLabel, slotLabel) => {
  if (!confirm(`${dateLabel} ${slotLabel} 예약을 취소할까요?`)) return;
  try {
    await deleteDoc(doc(db, 'bookings', docId));
    addNoti('❌', `${dateLabel} ${slotLabel} 예약 취소`);
    showToast('예약이 취소됐어요.');
  } catch(e) { showToast('취소 실패. 다시 시도해주세요.'); }
};

// ─── 내 예약 목록 ───
function renderMyBookings() {
  const el = document.getElementById('my-bookings-list');
  const mine = [];
  Object.entries(allBookings).forEach(([date, slots]) => {
    Object.entries(slots).forEach(([si, entry]) => {
      if (entry.uid === currentUser?.uid) {
        mine.push({ date, si: +si, slotLabel: SLOTS[+si], docId: entry.docId });
      }
    });
  });
  mine.sort((a,b) => a.date.localeCompare(b.date) || a.si - b.si);
  if (!mine.length) { el.innerHTML = '<div class="empty-msg">예약 내역이 없어요</div>'; return; }
  el.innerHTML = mine.map(m => {
    const dateLabel = new Date(m.date+'T00:00:00').toLocaleDateString('ko-KR', {month:'long', day:'numeric', weekday:'short'});
    return `<div class="booking-item">
      <div class="booking-info">
        <div class="booking-date">${dateLabel}</div>
        <div class="booking-time">${m.slotLabel} · 연습실</div>
      </div>
      <button class="cancel-btn" onclick="cancelBooking('${m.docId}','${dateLabel}','${m.slotLabel}')">취소</button>
    </div>`;
  }).join('');
}

// ─── 관리자 ───
window.setAdminTab = (tab, el) => {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('admin-stats-view').style.display = tab==='stats' ? 'block' : 'none';
  document.getElementById('admin-all-view').style.display = tab==='all' ? 'block' : 'none';
};

function updateStats() {
  let total = 0, todayCount = 0, users = new Set();
  const todayKey = dk(today);
  Object.entries(allBookings).forEach(([date, slots]) => {
    Object.values(slots).forEach(entry => {
      total++; users.add(entry.uid);
      if (date === todayKey) todayCount++;
    });
  });
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-hours').textContent = (total * 0.5).toFixed(1) + 'h';
  document.getElementById('stat-today').textContent = todayCount;
  document.getElementById('stat-users').textContent = users.size;
}

function renderAllBookings() {
  const el = document.getElementById('all-bookings-list');
  const all = [];
  Object.entries(allBookings).forEach(([date, slots]) => {
    Object.entries(slots).forEach(([si, entry]) => {
      all.push({ date, si: +si, slotLabel: SLOTS[+si], ...entry });
    });
  });
  all.sort((a,b) => a.date.localeCompare(b.date) || a.si - b.si);
  if (!all.length) { el.innerHTML = '<div class="empty-msg">예약 내역이 없어요</div>'; return; }
  el.innerHTML = all.map(a => {
    const dateLabel = new Date(a.date+'T00:00:00').toLocaleDateString('ko-KR', {month:'long', day:'numeric', weekday:'short'});
    return `<div class="admin-booking-item">
      <div class="admin-booking-row">
        <div class="admin-booking-name">${a.user}</div>
        <div style="font-size:11px;color:#aaa;">${dateLabel}</div>
      </div>
      <div class="admin-booking-detail">${a.slotLabel}</div>
    </div>`;
  }).join('');
}

// ─── 알림 ───
function addNoti(icon, text) {
  const now = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
  notiItems.unshift({ icon, text, time: now });
  renderNoti();
}

function renderNoti() {
  const el = document.getElementById('noti-list');
  if (!notiItems.length) { el.innerHTML = '<div class="empty-msg">알림이 없습니다</div>'; return; }
  el.innerHTML = notiItems.map(n =>
    `<div class="noti-item"><div class="noti-icon">${n.icon}</div><div><div class="noti-text">${n.text}</div><div class="noti-time">카카오 알림톡 · ${n.time}</div></div></div>`
  ).join('');
}

// ─── 탭 전환 ───
window.setTab = (name, el) => {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  el.classList.add('active');
};
</script>
</body>
</html>
